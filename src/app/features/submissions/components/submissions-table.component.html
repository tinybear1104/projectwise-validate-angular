<div class="table-scroll-container" (scroll)="onScroll($event)">
  <table mat-table [dataSource]="dataSource" class="submissions-table">
    <!-- Workflow Number Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Workflow Number</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Submission Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Submission Name</th>
      <td mat-cell *matCellDef="let element" class="name-cell">{{ element.name }}</td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">{{ element.status }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  @if (isLoadingMore) {
    <div class="loading-indicator">
      <mat-spinner diameter="30"></mat-spinner>
      <span>Loading more submissions...</span>
    </div>
  }
</div>
